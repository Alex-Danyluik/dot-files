# --- General Settings ---
set -g default-terminal "alacritty"
set -as terminal-overrides ",alacritty:Tc" # Enable True Color for Alacritty

# Change prefix to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Quality of life
set -g mouse on               # Enable mouse support
set -g base-index 1           # Start windows at 1 instead of 0
set -g pane-base-index 1      # Start panes at 1 instead of 0
set -g renumber-windows on    # Automatically renumber windows when one is closed
set -s escape-time 0          # Faster command sequences (vital for Vim)

# --- Vim Bindings ---
#setw -g mode-keys vi          # Use Vim keys in copy mode

# Move between panes with Vim movement keys
#bind h select-pane -L
#bind j select-pane -D
#bind k select-pane -U
#bind l select-pane -R
#
## Easy resizing of panes
#bind -r H resize-pane -L 5
#bind -r J resize-pane -D 5
#bind -r K resize-pane -U 5
#bind -r L resize-pane -R 5

set -g status-style bg='#ffffff',fg='#000000'
set -g status-left '#[fg=#ffffff,bg=#000000,bold] #S '
set -g status-right '#[fg=#ffffff,bg=#000000] %Y-%m-%d | %H:%M '

set -g window-status-current-style bg='#000000',fg='#ffffff',bold
set -g pane-border-style fg='#000000'
set -g pane-active-border-style fg='#ffffff'
set -g message-style bg='#ffffff',fg='#000000'
