# ==========================================
# Oxocarbon Theme for Tmux
# ==========================================

# Default statusbar colors
set-option -g status-style bg="#161616",fg="#f2f4f8"

# Default window title colors (inactive windows)
set-window-option -g window-status-style bg=default,fg="#525252"

# Active window title colors
set-window-option -g window-status-current-style bg=default,fg="#be95ff",bold

# Pane border
set-option -g pane-border-style fg="#393939"
set-option -g pane-active-border-style fg="#ee5396"

# Message text (command line)
set-option -g message-style bg="#262626",fg="#f2f4f8"

# Bell
set-window-option -g window-status-bell-style bg="#ee5396",fg="#161616"
